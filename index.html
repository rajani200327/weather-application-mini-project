<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Forecast Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
</head>

<body>

  <header>
    <h1>Weather Forecast Dashboard</h1>
    <div id="clock"></div>
  </header>

  <div class="container">

    <div class="sidebar">
      <h3>Search City</h3>
      <input type="text" class="city-input" placeholder="Enter city name">
      <button class="search-btn">Search</button>
      <button class="location-btn">Use Current Location</button>
      <div class="history">
        <h3>Search History</h3>
        <ul class="history-list"></ul>
      </div>
    </div>

    <div class="main">

      <div class="weather-card">
        <div class="weather-info">
          <h2 id="city-name">City</h2>
          <p>Temperature: <span id="temp">--</span>°C</p>
          <p>Wind: <span id="wind">--</span> m/s</p>
          <p>Humidity: <span id="humidity">--</span>%</p>
        </div>
        <!-- FIX 8: Added alt attribute for accessibility -->
        <img id="weather-icon" alt="Current weather icon">
      </div>

      <div class="aqi-card">
        <h3>Air Quality</h3>
        <p id="aqi">--</p>
      </div>

      <h2 class="forecast-title">5 Day Forecast</h2>
      <div class="forecast"></div>

    </div>
  </div>

</body>
</html>
